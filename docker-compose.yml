services:
  app:
    build: .
    ports:
      - '3000:3000'
      - '5173:5173'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:root@mysql:3306/taskboard
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=secret
      - JWT_REFRESH_SECRET=refresh_secret
      - TEST_API_URL=http://app:3000/api
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=taskboard
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
